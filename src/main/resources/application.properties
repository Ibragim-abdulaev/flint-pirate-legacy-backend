# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pirate_legacy}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
# 'none' is the safest choice when using Flyway.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Disable automatic schema initialization by JPA
spring.sql.init.mode=never

# ===============================
# Flyway Database Migration
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Automatically creates the baseline if the schema history table doesn't exist.
spring.flyway.baseline-on-migrate=true


# ===============================
# JWT (JSON Web Token)
# ===============================
# It's highly recommended to use a long, random, and secure secret, preferably from environment variables.
jwt.secret=${JWT_SECRET:V3ryL0ngAndS3cur3SecretKeyThatIsAtLeast64BytesLongForHS256Algorithm!}
# Expiration time in milliseconds (default: 24 hours)
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# CORS (Cross-Origin Resource Sharing)
# ===============================
# List of allowed origins for frontend applications. Use comma-separated values for multiple origins.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===============================
# Game Configuration Paths
# ===============================
game.config.characters-path=classpath:game/characters.json
game.config.starters-path=classpath:game/starters.json
game.config.quests-path=classpath:game/quests.json

# ===============================
# Game Development Settings
# ===============================
# Enables admin-only endpoints (e.g., reloading quests). Set to 'false' in production.
game.admin.enabled=true
# If true, deletes all quests from the DB on startup and reloads from JSON. Useful for development.
game.quests.force-reload=false

# ===============================
# Logging
# ===============================
logging.level.org.example.piratelegacy=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
logging.file.name=logs/pirate-legacy.log

# ===============================
# Redis
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# =======================================
# Cache Configuration
# =======================================
spring.cache.type=redis
# Default time-to-live for cache entries (10 minutes in milliseconds)
spring.cache.redis.time-to-live=600000