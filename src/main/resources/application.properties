spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pirate_legacy
    username: pirate_user
    password: pirate_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # удобно в DEV
    show-sql: false    # отключаем "сырой" вывод Hibernate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: debug            # лог запросов
    org.hibernate.orm.jdbc.bind: trace  # лог параметров

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

server:
  port: 8080

jwt:
  secret: "super_secret_key_for_jwt_which_should_be_512bit"
  expiration: 86400000 # 24h