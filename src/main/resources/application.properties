# ===============================
# Database
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pirate_legacy}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# ===============================
# Flyway
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:V3ryL0ngAndS3cur3SecretKeyThatIsAtLeast64CharactersLongForHS512Algorithm!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# CORS
# ===============================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===============================
# Game settings
# ===============================
game.battle.max-enemies-per-quest=5
game.battle.min-enemies-per-quest=3
game.battle.default-player-hp=100
game.battle.base-reward-multiplier=1.0

# ===============================
# First quest configuration
# ===============================
game.first-quest.name=?????? ??????????? ???
game.first-quest.description=??? ?????? ????? ???????? ???? ?????????! ?????? - ?????? ???, ??? ???? ???????? ???. ????? ???, ? ?? ?????? ?????!
game.first-quest.completion-reward.gold=50
game.first-quest.completion-reward.wood=25
game.first-quest.completion-reward.stone=15

# ===============================
# Logging
# ===============================
logging.level.org.example.piratelegacy=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/pirate-legacy.log